<h1 id=_1>重新执行运动控制指令</h1><h2 id=_2>描述</h2><p>运动控制指令的重新执行意味着你可以在执行过程中改变运动控制指令的输入变量，并在操作过程中再次执行该指令以改变目标值。<p>重新执行Trio MC_xx运动控制指令对于那些有“Execute”输入但没有“ContinuousUpdate”输入的功能块是有效的。<p>在同一实例中，如果没有 “ContinuousUpdate” 输入，当输入变量值在运动控制指令执行时被更改，且“Execute”更改为TRUE, FALSE，然后再次返回TRUE时，操作将遵循新值。<p>当带有“ContinuousUpdate”输入的函数块正在执行时，所有改变的值都将被忽略。
