<h1 id=posi_seq_delay>POSI_SEQ_DELAY</h1><h2 id=type>Type</h2><p><em><strong>Axis Parameter</strong></em><h2 id=description>Description</h2><p>This command controls the number of servo cycles delay applied to the demand position (DPOS). This feature is enabled through POSI_SEQ_MODE.<h2 id=value>Value</h2><p>Default value is 0.<h2 id=see-also>See Also</h2><p><a href=DPOS.html>DPOS</a>, <a href=POSI_SEQ_MODE.html>POSI_SEQ_MODE</a><nav class=md-tags><span class=md-tag>Axis Parameter</span></nav>
