<h1 id=aout03>AOUT0..3</h1><h2 id=type>Type</h2><p><em><strong>System Parameter</strong></em><h2 id=description>Description</h2><p>These system parameters duplicate the <a href=AOUT.html>AOUT</a> command.<p>They provide the value of the analogue output channels in system parameter format to allow the <a href=SCOPE.html>SCOPE</a> function (Which can only store parameters) to read the analogue outputs.<nav class=md-tags><span class=md-tag>System Parameter</span></nav>
