<h1 id=pp_step>PP_STEP</h1><h2 id=type>Type</h2><p><em><strong>Axis Parameter</strong></em><h2 id=description>Description</h2><p>PP_STEP is an integer multiplier on the encoder value<div class="admonition success"><p><a href=UNITS.html>UNITS</a> and <a href=ENCODER_RATIO.html>ENCODER_RATIO</a> should be used in preference to PP_STEP</div><h2 id=value>Value</h2><p>Integer multiplier range (default = 1)<div class="admonition danger"><p>It is recommended to only use values between -1024 and 1023</div><nav class=md-tags><span class=md-tag>Axis Parameter</span></nav>
