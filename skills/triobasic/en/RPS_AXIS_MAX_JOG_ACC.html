<h1 id=axis_max_jog_acc>AXIS_MAX_JOG_ACC</h1><h2 id=type>Type</h2><p><em><strong>Robotics Parameter</strong></em><h2 id=description>Description</h2><p>Sets or reads the axis maximum jog acceleration that a robot axis can run at when performing a jog.<h2 id=value>Value</h2><p>The acceleration in user <a href=AXIS_UNITS.html>AXIS_UNITS</a> per second per second.<h2 id=see-also>See Also</h2><p><a href=RPS_AXIS_JOGSPEED.html>AXIS_JOGSPEED</a>, <a href=AXIS_UNITS.html>AXIS_UNITS</a><nav class=md-tags><span class=md-tag>Robotics Parameter</span></nav>
