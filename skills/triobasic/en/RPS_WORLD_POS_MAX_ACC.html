<h1 id=world_pos_max_acc>WORLD_POS_MAX_ACC</h1><h2 id=type>Type</h2><p><em><strong>Robotics Parameter</strong></em><h2 id=description>Description</h2><p>The WORLD_POS_MAX_ACC axis parameter can be used to read and write the maximum possible linear axis acceleration in world mode.<h2 id=value>Value</h2><p>The robot axis maximum linear acceleration in mm / sec2.<h2 id=see-also>See Also</h2><p><a href=AXIS_UNITS.html>AXIS_UNITS</a><nav class=md-tags><span class=md-tag>Robotics Parameter</span></nav>
