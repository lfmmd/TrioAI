<h1 id=hls_node>HLS_NODE</h1><h2 id=type>Type</h2><p><em><strong>System Parameter</strong></em><h2 id=description>Description</h2><p>Sets the Hostlink node number for the slave node. Used in multidrop RS485 Hostlink networks or set to 0 for RS232 single master/slave link.<nav class=md-tags><span class=md-tag>System Parameter</span></nav>
