<h1 id=scope_cycle_count>SCOPE_CYCLE_COUNT</h1><h2 id=type>Type</h2><p><em><strong>System Parameter</strong></em><h2 id=description>Description</h2><p>This parameter is incremented every time a <a href=SCOPE.html>SCOPE</a> capture cycle starts. This parameter can be used in conjunction with <a href=SCOPE_POS.html>SCOPE_POS</a> to discover how many table points are available to be read.<h2 id=value>Value</h2><p>The current count.<nav class=md-tags><span class=md-tag>System Parameter</span></nav>
