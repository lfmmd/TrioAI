<h1 id=drive_clear>DRIVE_CLEAR</h1><h2 id=_1>类型</h2><p><em><strong>轴函数</strong></em><h2 id=_2>语法</h2><p><code>value = DRIVE_CLEAR(parameter)</code><h2 id=_3>描述</h2><p>DRIVE_CLEAR允许用户清除驱动中的报警。目前只支持松下RTEX驱动器。<div class="admonition success"><p><a href=DRIVE_READ.html>DRIVE_READ</a>可以用来读取报警的值</div><h2 id=_4>参数</h2><table><thead><tr><th><th><th><tbody><tr><td rowspan=3 style=vertical-align:top>parameter:<td>0<td>清除电流报警<tr><td>1<td>清除所有历史报警<tr><td>2<td>清除所有外部报警</table><h2 id=_5>查看</h2><p><a href=DRIVE_READ.html>DRIVE_READ</a><nav class=md-tags><span class=md-tag>轴函数</span></nav>
