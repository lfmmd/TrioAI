<h1 id=lookup>LOOKUP</h1><h2 id=_1>类型</h2><p><em><strong>处理命令</strong></em><h2 id=_2>语法</h2><p><code>LOOKUP(format,entry) &lt;PROC(process#)></code><h2 id=_3>描述</h2><p>Motion Perfect使用LOOKUP命令访问正在执行的进程中的局部变量。<div class="admonition success"><p>您应该使用Motion Perfect中的变量观察窗口来访问执行过程中的变量。</div><h2 id=_4>参数</h2><table><thead><tr><th><th><th><tbody><tr><td rowspan=5 style=vertical-align:top>format:<td>0<td>从表达式中打印(二进制)浮点值<tr><td>1<td>从表达式中打印(二进制)整数值<tr><td>2<td>从进程中打印(二进制)局部变量<tr><td>3<td>从进程返回到BASIC局部变量<tr><td>4<td>写<tr><td>entry:<td colspan=2 style=text-align:left>表达式字符串(format=0或1)或局部变量在进程局部变量列表中的偏移数。</table><nav class=md-tags><span class=md-tag>处理命令</span></nav>
