<h1 id=axis_enable_override>AXIS_ENABLE_OVERRIDE</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>可用于独立启用某轴。默认情况下是OFF，即使WDOG和AXIS_ENABLE为OFF，也能将该参数设置为ON以启用（激活）轴。目的是允许Motion Perfect进行Jog并设置EtherCAT或类似从站的驱动器调谐。<div class="admonition note"><p><em>需要固件版本2.0305或更高版本</em></div><h2 id=_3>值</h2><p>接受值<a href=ON.html>ON</a>或<a href=OFF.html>OFF</a>，默认值为OFF。<h2 id=_4>例</h2><p>启用单个轴用于设置。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=k>BASE</span><span class=p>(</span><span class=vg>axis_number</span><span class=p>)</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=vg>AXIS_ENABLE_OVERRIDE</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=kr>ON</span><span class=w> </span><span class=c1>'启用轴(不需要启用WDOG)</span>
</span></code></pre></div><nav class=md-tags><span class=md-tag>轴参数</span></nav>
