<h1 id=canio_enable>CANIO_ENABLE</h1><h2 id=_1>类型</h2><p><em><strong>I / O参数</strong></em><h2 id=_2>描述</h2><p>CANIO_ENABLE启用Trio CAN I/O或CANopen协议。<p>当使用Trio I/O协议时，它由固件自动设置。配置CAN open I/O后，必须手动设置CANIO_ENABLE = <a href=ON.html>ON</a>。<a href=ON.html></a><h2 id=_3>值</h2><table><thead><tr><th><th><tbody><tr><td><a href=ON.html>ON</a><td>启用CAN协议(当CANIO_ADDRESS = 32时默认)<tr><td><a href=OFF.html>OFF</a><td>禁用CAN协议(当CANIO_ADDRESS &lt;> 32时为默认)</table><nav class=md-tags><span class=md-tag>I / O参数</span></nav>
