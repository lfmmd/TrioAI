<h1 id=world_ori_max_acc>WORLD_ORI_MAX_ACC</h1><h2 id=_1>类型</h2><p><em><strong>机器人参数</strong></em><h2 id=_2>描述</h2><p>WORLD_ORI_MAX_ACC轴参数可用于在世界模式中读取和写入最大可能的方向轴加速度。<h2 id=_3>值</h2><p>机器人轴的最大方向加速度，单位为度/秒2。<h2 id=_4>查看</h2><p><a href=RPS_WORLD_ORI_MAX_SPEED.html>WORLD_ORI_MAX_SPEED</a>, WORLD_ORI_MAX_JERK<nav class=md-tags><span class=md-tag>机器人参数</span></nav>
