<h1 id=ain03ainbi03>AIN0..3/AINBI0..3</h1><h2 id=_1>类型</h2><p><em><strong>系统参数</strong></em><h2 id=_2>描述</h2><p>这些系统参数与AIN命令重复。<p>AIN0..3 被用于单边模拟量输入。<p>AINBI0..3 被用于双极输入。<p>它们以系统参数格式提供模拟输入通道量的值，以允许 <a href=SCOPE.html>SCOPE</a> 函数（只能存储参数）读取模拟量输入。<div class="admonition note"><p><em>如果没有安装CAN模拟模块，AIN0和AIN1将读取前两个内置通道。</em></div><nav class=md-tags><span class=md-tag>系统参数</span></nav>
