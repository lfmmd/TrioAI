<h1 id=disable_robot>DISABLE_ROBOT</h1><h2 id=_1>类型</h2><p><em><strong>机器人命令</strong></em><h2 id=_2>语法</h2><p><code>DISABLE_ROBOT(value)</code><h2 id=_3>描述</h2><p>此命令禁止任何机器人程序运行。任何正在运行的机器人程序将被停止，移动缓冲区将被清除。<h2 id=_4>参数</h2><table><thead><tr><th><th><tbody><tr><td>value:<td>TRUE =命令被激活。没有机器人程序正在运行，缓冲区被清空。<br>FALSE =命令被停用。</table><h2 id=_5>例</h2><h3 id=1>例1</h3><p>当输入12被触发时，禁用机器人1。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>ROBOT</span><span class=p>(</span><span class=il>1</span><span class=p>)</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a>
</span><span id=__span-0-3><a href=#__codelineno-0-3 id=__codelineno-0-3 name=__codelineno-0-3></a><span class=kr>WHILE</span><span class=w> </span><span class=vg>IN</span><span class=p>(</span><span class=il>12</span><span class=p>)</span><span class=o>=</span><span class=kr>ON</span>
</span><span id=__span-0-4><a href=#__codelineno-0-4 id=__codelineno-0-4 name=__codelineno-0-4></a><span class=w>    </span><span class=vg>DISABLE_ROBOT</span><span class=p>(</span><span class=vg>TRUE</span><span class=p>)</span>
