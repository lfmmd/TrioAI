<h1 id=axisvalues>AXISVALUES</h1><h2 id=_1>类型</h2><p><em><strong>轴命令</strong></em><h2 id=_2>语法</h2><p><code>AXISVALUES(axis, bank)</code><h2 id=_3>描述</h2><p>由_Motion_ Perfect用来读取一组轴参数。<p>返回的数据格式为:<p>&lt;参数> &lt;类型> = &lt;值><p>&lt;参数>是参数的名称<p>&lt;类型>是值的类型：<table><thead><tr><th><th><tbody><tr><td>i<td>整型<tr><td>F<td>浮点型<tr><td>S<td>字符串型<tr><td>C<td>大小写字母的字符串，其中大写字母表示错误。</table><p>&lt;值>是整型、浮点型或字符串型，具体取决于类型<h2 id=_4>参数</h2><table><thead><tr><th><th><th><tbody><tr><td>axis:<td colspan=2 style=text-align:left>要读取参数的轴号<tr><td rowspan=3 style=vertical-align:top>bank:<td colspan=2 style=text-align:left>您希望读取的参数库。<tr><td>0<td>显示仅通过TrioBASIC调整的数据。<tr><td>1<td>显示运动生成器所改变的数据。</table><nav class=md-tags><span class=md-tag>轴命令</span></nav>
