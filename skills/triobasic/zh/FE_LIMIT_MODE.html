<h1 id=fe_limit_mode>FE_LIMIT_MODE</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>该参数决定了当<a href=FE.html>FE</a>超过<a href=FE_LIMIT.html>FE_LIMIT</a>，或者超过连续2个伺服周期时，是否立即产生<a href=AXISSTATUS.html>AXISSTATUS</a>错误。<a href=FE_LIMIT.html>这意味着如果仅在一个伺服周期内超过了FE_LIMIT</a>，错误将被忽略。<div class="admonition danger"><p>这将增加在出现错误时禁用驱动器所需的时间。您只能在Trio或您的分销商的建议下更改默认值。</div><h2 id=_3>值</h2><table><thead><tr><th><th><tbody><tr><td>0<td><a href=AXISSTATUS.html></a>立即生成<a href=AXISSTATUS.html>AXISSTATUS</a>错误(默认)<tr><td>1<td><a href=AXISSTATUS.html></a>当<a href=FE_LIMIT.html></a>超过 <a href=FE_LIMIT.html>FE_LIMIT</a>连续2个伺服周期时产生<a href=AXISSTATUS.html>AXISSTATUS</a>错误。</table><h2 id=_4>查看</h2><p><a href=FE.html>FE</a>, <a href=FE_LATCH.html>FE_LATCH</a>, <a href=FE_LIMIT.html>FE_LIMIT</a>, <a href=FE_RANGE.html>FE_RANGE</a><nav class=md-tags><span class=md-tag>轴参数</span></nav>
