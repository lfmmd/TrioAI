<h1 id=nio>NIO</h1><h2 id=_1>类型</h2><p><em><strong>I / O参数</strong></em><h2 id=_2>描述</h2><p>这个参数返回系统适配的输入/输出的个数。该值通常由固件根据检测到的总I/O来设置;包括模块I/O, CAN I/O，现场总线I/O和CANopen I/O。<div class="admonition success"><p>NIO之外的输入/输出可以用作虚拟</div><h2 id=_3>值</h2><p>正在使用的最高输入/输出点+ 1。如果输入的数量与输出的数量不相同，则在NIO参数中返回较高的计数。<h2 id=_4>例</h2><p>除了控制器上的16个内置I/O点外，还有32个外部I/O点。在终端输入?NIO:<p><code>>>?NIO</code><p><code>48.0000</code><p><code>>></code><p>请注意;在这种情况下，最后一个可寻址的I/O点是IN(47)和OP(47, state)<nav class=md-tags><span class=md-tag>I / O参数</span></nav>
