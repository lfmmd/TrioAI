<h1 id=dir>DIR</h1><h2 id=_1>类型</h2><p><em><strong>系统命令 (仅限命令行)</strong></em><h2 id=_2>语法</h2><p><code>DIR [option]</code><h2 id=_3>替代格式</h2><p><code>LS [option]</code><h2 id=_4>描述</h2><p>打印所有程序的清单，包括它们的大小和 <a href=RUNTYPE.html>RUNTYPE</a>.<h2 id=_5>参数</h2><table><thead><tr><th><strong>参数</strong><th><strong>功能</strong><tbody><tr><td>none<td>控制器存储的目录列表<tr><td>d<td>SD 卡存储的目录列表<tr><td>u1 or<br><br>u2<td>USB 存储的目录列表(仅限Flex-7)<tr><td>s<td rowspan=2 style=vertical-align:bottom>保留功能<tr><td>x</table><nav class=md-tags><span class=md-tag>系统命令</span></nav>
