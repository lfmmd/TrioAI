<h1 id=aff_gain>AFF_GAIN</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>设置轴的加速度前馈。 这是一个乘数因子，应用于给定速度的变化率。 结果加到控制环路输出中，以给出<a href=DAC_OUT.html>DAC_OUT</a> 值。<div class="admonition note"><p><em>AFF_GAIN仅在反馈中每转计数很高的系统中有效。 即 每转计数65536或者更大。</em></div><nav class=md-tags><span class=md-tag>轴参数</span></nav>
