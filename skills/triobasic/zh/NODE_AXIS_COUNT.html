<h1 id=node_axis_count>NODE_AXIS_COUNT</h1><h2 id=_1>类型</h2><p><em><strong>系统数组(MC_CONFIG)</strong></em><h2 id=_2>语法</h2><p><code>NODE_AXIS_COUNT(slot, node) = value</code><h2 id=_3>描述</h2><p>这个二维数组可用于设置位于单个EtherCAT节点上的轴的数量。在使用多轴驱动器时，这可以用来定义用户特定的轴映射。<p>数组是二维的，第一维是主站槽标识符，第二维是节点在主站网络内的位置。<h2 id=_4>值</h2><table><thead><tr><th><th><tbody><tr><td>1<td>单轴EtherCAT节点(默认)<tr><td>2 - n<td>分配给EtherCAT节点的轴数</table><h2 id=_5>查看：</h2><p><a href=NODE_AXIS.html>NODE_AXIS</a>, <a href=NODE_INDEX.html>NODE_INDEX</a>, <a href=NODE_PROFILE.html>NODE_PROFILE</a>,<nav class=md-tags><span class=md-tag>系统数组</span></nav>
