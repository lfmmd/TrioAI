<h1 id=invert_in>INVERT_IN</h1><h2 id=_1>类型</h2><p><em><strong>I / O命令</strong></em><h2 id=_2>语法</h2><p><code>INVERT_IN(input, state)</code><h2 id=_3>描述</h2><p>INVERT_IN命令允许在软件中单独取反输入通道。<div class="admonition note"><p><em>这一点很重要，因为这些输入通道可以被分配来激活进给保持等功能。</em></div><h2 id=_4>参数</h2><table><thead><tr><th><th><th><tbody><tr><td>input:<td colspan=2 style=text-align:left>要取反的输入<tr><td rowspan=2 style=vertical-align:top>state:<td><a href=ON.html>ON</a><td>在软件中输入是反向的<tr><td><a href=OFF.html>OFF</a><td>输入不反向</table><h2 id=_5>例</h2><p>取反输入7，以便当输入关闭时，<a href=FWD_JOG.html>FWD_JOG</a>关闭。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>INVERT_IN</span><span class=p>(</span><span class=il>7</span><span class=p>,</span><span class=w> </span><span class=kr>ON</span><span class=p>)</span>
