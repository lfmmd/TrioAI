<h1 id=peek>PEEK</h1><h2 id=_1>类型</h2><p><em><strong>系统功能</strong></em><h2 id=_2>语法</h2><p><code>value = PEEK(address [,mask])</code><h2 id=_3>描述</h2><p>PEEK命令返回控制器内存位置的值，并带有可选的掩码值。<div class="admonition note"><p><em>PEEK通常仅用于调试目的，应仅在Trio Motion Technology的指导下使用</em></div><h2 id=_4>参数</h2><table><thead><tr><th><th><tbody><tr><td>value:<td>从内存位置返回的值<tr><td>address:<td>要读取的内存地址<tr><td>mask:<td>一个值，这样你可以过滤地址的特定位</table><nav class=md-tags><span class=md-tag>系统功能</span></nav>
