<h1 id=encoder_filter>ENCODER_FILTER</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>该参数允许对编码器反馈应用滤波，以减少抖动的影响。该值越小，时间常数越大，因此抖动对系统的影响就越小。<div class="admonition success"><p>这个参数可以用来减少与另一个轴相连的主轴上的抖动。</div><h2 id=_3>值</h2><p>滤波参数范围0.001 ~ 1(默认1)。<h2 id=_4>例</h2><p>对线性编码器应用滤波器，使连接的轴不受任何抖动的影响:<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=k>BASE</span><span class=p>(</span><span class=il>0</span><span class=p>)</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=vg>ENCODER_FILTER</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=mf>0.95</span>
</span><span id=__span-0-3><a href=#__codelineno-0-3 id=__codelineno-0-3 name=__codelineno-0-3></a><span class=k>BASE</span><span class=p>(</span><span class=il>1</span><span class=p>)</span>
</span><span id=__span-0-4><a href=#__codelineno-0-4 id=__codelineno-0-4 name=__codelineno-0-4></a><span class=vg>CONNECT</span><span class=p>(</span><span class=il>1</span><span class=p>,</span><span class=il>0</span><span class=p>)</span>
</span></code></pre></div><nav class=md-tags><span class=md-tag>轴参数</span></nav>
