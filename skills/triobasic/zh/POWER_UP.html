<h1 id=power_up>POWER_UP</h1><h2 id=_1>类型</h2><p><em><strong>系统参数</strong></em><h2 id=_2>语法</h2><div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>POWER_UP</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=vg>value</span>

</span><span id=__span-1-2><a href=#__codelineno-1-2 id=__codelineno-1-2 name=__codelineno-1-2></a><span class=nl>0</span>
</span></code></pre></div><nav class=md-tags><span class=md-tag>系统参数</span></nav>
