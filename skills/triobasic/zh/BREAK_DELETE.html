<h1 id=break_delete>BREAK_DELETE</h1><h2 id=_1>类型</h2><p><em><strong>系统命令(仅限命令行)</strong></em><h2 id=_2>语法</h2><p><code>BREAK_DELETE "program name" line_number</code><h2 id=_3>描述</h2><p>由_Motion_ Perfect用于从指定程序中移除指定行号处的断点。<div class="admonition note"><p><em>如果选择了不存在的行号(例如，当程序只有40行时选择了第50行)，控制器将返回错误。</em></div><h2 id=_4>参数</h2><table><thead><tr><th><th><tbody><tr><td>program name:<td>控制器上存在的任何程序的名称<tr><td>line_number:<td>要删除断点的行号</table><h2 id=_5>例</h2><p>删除程序“simpletest”第8行的断点<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>BREAK_DELETE</span><span class=w> </span><span class=s2>"simpletest"</span><span class=w> </span><span class=il>8</span>
</span></code></pre></div><nav class=md-tags><span class=md-tag>系统命令</span></nav>
