<h1 id=world_units>WORLD_UNITS</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>WORLD_UNITS是一个转换因子，允许用户将边沿/步进脉冲缩放到更方便的比例。WORLD_UNITS仅在<a href=FRAME.html>FRAME</a>处于激活状态时使用，并且仅应用于轴坐标系中的参数(在<a href=FRAME.html>FRAME</a>之后)。这包括<a href=WORLD_DPOS.html>WORLD_DPOS</a>、<a href=WORLD_FS_LIMIT.html>WORLD_FS_LIMIT</a>和<a href=WORLD_RS_LIMIT.html>WORLD_RS_LIMIT</a>。 <a href=WORLD_RS_LIMIT.html></a><h2 id=_3>值</h2><p>每个所需单位的计数(默认=1)。<h2 id=_4>查看</h2><p><a href=WORLD_DPOS.html>WORLD_DPOS</a>, <a href=WORLD_FS_LIMIT.html>WORLD_FS_LIMIT</a>, <a href=WORLD_RS_LIMIT.html>WORLD_RS_LIMIT</a>, <a href=UNITS.html>UNITS</a>, <a href=AXIS_UNITS.html>AXIS_UNITS</a><nav class=md-tags><span class=md-tag>轴参数</span></nav>
