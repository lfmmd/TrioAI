<h1 id=poke>POKE</h1><h2 id=_1>类型</h2><p><em><strong>系统命令</strong></em><h2 id=_2>语法</h2><p><code>POKE(address, value)</code><h2 id=_3>描述</h2><p>POKE命令允许将一个值输入到控制器的内存位置。<div class="admonition danger"><p>POKE命令可以阻止控制器的正常操作，只有在Trio Motion Technology的指示下才能使用。</div><h2 id=_4>参数</h2><table><thead><tr><th><th><tbody><tr><td>address:<td>要读取的内存地址<tr><td>mask:<td>一个值，这样你可以过滤地址的特定位</table><nav class=md-tags><span class=md-tag>系统命令</span></nav>
