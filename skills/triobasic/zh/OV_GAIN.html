<h1 id=ov_gain>OV_GAIN</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>输出速度(OV)增益是一个增益常数，乘以被测位置的变化。结果与所有其他增益项相加，并应用于伺服DAC。给系统增加负输出速度增益在机械上等同于增加阻尼。它很可能产生更平滑的响应，并允许使用比其他方法更高的比例增益，但代价是更高的跟随误差。高值可能导致振荡并产生高跟随误差。对于输出速度项Kov和位置变化DPm，对输出信号的贡献为:<h2 id=_3>值</h2><p>输出速度增益常数(默认= 0)<div class="admonition success"><p>通常需要负值。</div><nav class=md-tags><span class=md-tag>轴参数</span></nav>
