<h1 id=day>DAY$</h1><h2 id=_1>类型</h2><p><em><strong>字符串函数</strong></em><h2 id=_2>语法</h2><p>value = DAY$<h3 id=_3>描述</h3><p>用作<a href=PRINT.html>PRINT</a> 语句或 <a href=DIM.html>STRING</a>变量的一部分，以便将当前日期写成字符串形式。<div class="admonition note"><p><em>通过 <a href=DATE.html>DATE</a> 命令设置DAY$。</em></div><h2 id=_4>例</h2><h3 id=1>例1</h3><p>打印当前日期作为欢迎信息的一部分。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=kr>PRINT</span><span class=err>#</span><span class=il>5</span><span class=p>,</span><span class=w> </span><span class=s2>"Welcome to Trio on "</span><span class=p>;</span><span class=w> </span><span class=vg>DAY$</span>
</span></code></pre></div><h3 id=2>例 2</h3><p>当向SD卡写入日志时创建一个标题。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-1-1><a href=#__codelineno-1-1 id=__codelineno-1-1 name=__codelineno-1-1></a><span class=kd>DIM</span><span class=w> </span><span class=vg>header</span><span class=w> </span><span class=k>AS</span><span class=w> </span><span class=k>STRING</span><span class=p>(</span><span class=il>30</span><span class=p>)</span>
</span><span id=__span-1-2><a href=#__codelineno-1-2 id=__codelineno-1-2 name=__codelineno-1-2></a><span class=vg>header</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=vg>DAY$</span><span class=w> </span><span class=o>+</span><span class=w> </span><span class=s2>"Start of production"</span>
</span></code></pre></div><h2 id=_5>查看</h2><p><a href=DATE.html>DATE</a>, <a href=DATE$.html>DATE$</a>, <a href=DAY.html>DAY</a>, <a href=PRINT.html>PRINT</a>, <a href=DIM.html>STRING</a><nav class=md-tags><span class=md-tag>字符串函数</span></nav>
