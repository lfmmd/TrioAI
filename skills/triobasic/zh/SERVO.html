<h1 id=servo>SERVO</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>在伺服轴上，此参数决定轴是在伺服控制下还是开环下运行。当SERVO=OFF时，轴硬件将根据DAC参数输出需求值。当SERVO=ON轴硬件将输出一个给定值取决于增益设置和跟随误差。<h2 id=_3>值</h2><table><thead><tr><th><th><tbody><tr><td><a href=ON.html>ON</a><td>闭环伺服控制启用<tr><td><a href=OFF.html>OFF</a><td>闭环伺服控制关闭</table><h2 id=_4>例</h2><p>使能轴1在闭环控制下运行，轴1为开环。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>SERVO</span><span class=w> </span><span class=vg>AXIS</span><span class=w> </span><span class=p>(</span><span class=il>0</span><span class=p>)</span><span class=o>=</span><span class=kr>ON</span><span class=w>  </span><span class=c1>'轴0在伺服控制下</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=vg>SERVO</span><span class=w> </span><span class=vg>AXIS</span><span class=w> </span><span class=p>(</span><span class=il>1</span><span class=p>)</span><span class=o>=</span><span class=k>OFF</span><span class=w> </span><span class=c1>'轴1为开环运行</span>
</span></code></pre></div><nav class=md-tags><span class=md-tag>轴参数</span></nav>
