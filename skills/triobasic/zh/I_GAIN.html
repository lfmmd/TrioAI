<h1 id=i_gain>I_GAIN</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>作为闭环控制的一部分，为系统添加积分增益可以减少静止或稳定移动时的位置误差。它将产生或增加超调，并可能导致振荡。<p>对于积分增益Ki和位置误差之和∫e，对输出信号的贡献为:<h2 id=_3>值</h2><p>积分增益是一个常数，乘以以下误差的和。默认值= 0<h2 id=_4>例</h2><p>将增益值设置为STARTUP程序的一部分<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>P_GAIN</span><span class=o>=</span><span class=il>1</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=vg>I_GAIN</span><span class=o>=</span><span class=mf>0.01</span>
</span><span id=__span-0-3><a href=#__codelineno-0-3 id=__codelineno-0-3 name=__codelineno-0-3></a><span class=vg>D_GAIN</span><span class=o>=</span><span class=il>0</span>
