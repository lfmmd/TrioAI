<h1 id=list>LIST</h1><h2 id=_1>类型</h2><p><em><strong>系统命令(仅限命令行)</strong></em><h2 id=_2>语法</h2><p><code>LIST ["program"]</code><h2 id=_3>描述</h2><p>将当前<a href=SELECT.html>选定</a>的程序或指定的程序打印到当前输出通道。<div class="admonition note"><p><em>通常你会通过使用Motion Perfect来查看一个程序。</em></div><h2 id=_4>参数</h2><table><thead><tr><th><th><tbody><tr><td>none:<td>打印选中的程序<tr><td>program:<td>要打印的程序的名称</table><nav class=md-tags><span class=md-tag>系统命令</span></nav>
