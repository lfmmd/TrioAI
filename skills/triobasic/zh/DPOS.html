<h1 id=dpos>DPOS</h1><h2 id=_1>类型</h2><p><em><strong>轴参数(只读)</strong></em><h2 id=_2>描述</h2><p>给定位置DPOS是由运动命令生成的给定轴位置。<p>当<a href=SERVO.html>SERVO</a>或<a href=WDOG.html>WDOG</a>关闭时，<a href=DPOS.html>DPOS</a>设置为<a href=MPOS.html>MPOS</a>。<p>DPOS可以通过使用<a href=DEFPOS.html>DEFPOS或</a><a href=OFFPOS.html>OFFPOS</a>无需任何运动即可调整。<p>DPOS中的阶跃变化可以使用<a href=ENDMOVE.html>ENDMOVE</a>写入<h2 id=_3>值</h2><p>在用户单位中的给定位置。开机时默认为0。<h2 id=_4>例</h2><p>以用户单位返回轴10的给定位置<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=o>>>?</span><span class=w> </span><span class=vg>DPOS</span><span class=w> </span><span class=vg>AXIS</span><span class=p>(</span><span class=il>10</span><span class=p>)</span><span class=w> </span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=nl>5432</span>
</span><span id=__span-0-3><a href=#__codelineno-0-3 id=__codelineno-0-3 name=__codelineno-0-3></a><span class=o>>></span>
</span></code></pre></div><h2 id=_5>查看</h2><p><a href=DEFPOS.html>DEFPOS</a>, <a href=ENDMOVE.html>ENDMOVE</a>, <a href=OFFPOS.html>OFFPOS</a>, <a href=AXIS_DPOS.html>AXIS_DPOS</a><nav class=md-tags><span class=md-tag>轴参数</span></nav>
