</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=vg>SETCOM</span><span class=p>(</span><span class=il>19200</span><span class=p>,</span><span class=w> </span><span class=il>8</span><span class=p>,</span><span class=w> </span><span class=il>1</span><span class=p>,</span><span class=w> </span><span class=il>2</span><span class=p>,</span><span class=w> </span><span class=il>1</span><span class=p>,</span><span class=w> </span><span class=il>4</span><span class=p>)</span>
</span></code></pre></div><nav class=md-tags><span class=md-tag>系统参数</span></nav>
