<h1 id=axis_max_jerk>AXIS_MAX_JERK</h1><h2 id=_1>类型</h2><p><em><strong>机器人参数</strong></em><h2 id=_2>描述</h2><p>AXIS_MAX_JERK轴参数可用于读取和写入最大可能的轴加加速度。<p><a href=JERK.html>JERK</a>是加速度的导数。<a href=JERK.html>JERK</a>单位为/sec/sec/sec。<a href=JERK.html>JERK</a>应用于轴运动的方式取决于<a href=VP_MODE.html>VP_MODE</a>的值。<h2 id=_3>值</h2><p>机器人轴的最大<a href=JERK.html>JERK</a>单位为<a href=AXIS_UNITS.html>AXIS_UNITS</a> / 秒3。<h2 id=_4>查看</h2><p><a href=AXIS_UNITS.html>AXIS_UNITS</a>, <a href=JERK.html>JERK</a>, <a href=VP_MODE.html>VP_MODE</a>.<nav class=md-tags><span class=md-tag>机器人参数</span></nav>
