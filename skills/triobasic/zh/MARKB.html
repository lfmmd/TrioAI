<h1 id=markb>MARKB</h1><h2 id=_1>类型</h2><p><em><strong>轴参数(只读)</strong></em><h2 id=_2>描述</h2><p>此参数可以轮询，以确定Registration事件是否在第二个Registration通道上发生。<p>当<a href=REGIST.html>REGIST</a>被执行时，MARKB被重置。<h2 id=_3>值</h2><table><thead><tr><th><th><tbody><tr><td><a href=FALSE.html>FALSE</a><td>Registration事件未发生<tr><td><a href=TRUE.html>TRUE</a><td>Registration事件已经发生(默认)<tr><td>&lt; 1<td>已记录到<a href=TABLE.html>TABLE</a>的Registration事件数量</table><div class="admonition note"><p><em>当为<a href=TRUE.html>TRUE</a>时，<a href=REG_POSB.html>reg_posb</a>有效。</em></div><h2 id=_4>查看</h2><p><a href=REGIST.html>REGIST</a>, <a href=REG_POSB.html>reg_posb</a><a href=REG_POSB.html></a><nav class=md-tags><span class=md-tag>轴参数</span></nav>
