<h1 id=aout>AOUT</h1><h2 id=_1>类型</h2><p><em><strong>系统命令</strong></em><h2 id=_2>语法</h2><p><code>AOUT(channel)</code><h2 id=_3>描述</h2><p>将一个值写入模拟量输出。CAN模拟量模块提供模拟量输出。<p>发送的值是要写入D/A转换器的二进制数的十进制等效物。<h2 id=_4>参数</h2><table><thead><tr><th><th><tbody><tr><td>channel:<td>模拟输出通道数0…15</table><h2 id=_5>例</h2><p>输出设置为开环变频器驱动器的速度输入。10V为1500rpm，所需转速为300rpm。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>value</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=il>300</span><span class=w> </span><span class=o>*</span><span class=w> </span><span class=il>2048</span><span class=w> </span><span class=o>/</span><span class=w> </span><span class=il>1500</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=vg>AOUT</span><span class=p>(</span><span class=il>1</span><span class=p>)</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=vg>value</span>
</span></code></pre></div><p>模拟输出电压设为2V。<div class="admonition note"><p><em>电压是近似的，如果需要高精度，输出必须由用户校准。</em></div><nav class=md-tags><span class=md-tag>系统命令</span></nav>
