<h1 id=nop>NOP</h1><h2 id=_1>类型</h2><p><em><strong>系统参数</strong></em><h2 id=_2>描述</h2><p>该参数返回系统适配的输出数量。该值通常由固件设置，考虑到检测到的总I/O，包括模块I/O, CAN I/O，现场总线I/O和CANopen I/O。<h2 id=_3>值</h2><p>正在使用的最高输出点+ 1。<h2 id=_4>例</h2><p>除了控制器上的8个内置I/O点外，还有64个外部输出点。在终端输入?NOP:<p><code>>>?NOP</code><p><code>80.0000</code><p><code>>></code><p>请注意;在本例中，最后一个可寻址的输出点是OP(79, state)和READ_OP(79)。输出从OP(8, state)开始，因此NOP值不是总输出点，它是输出映射中可用的最高值。<h2 id=_5>查看</h2><p><a href=IOSIZE.html>IOSIZE</a>, <a href=NIN.html>NIN</a><nav class=md-tags><span class=md-tag>系统参数</span></nav>
