<h1 id=plc_run>PLC_RUN</h1><h2 id=_1>类型</h2><p><em><strong>系统参数</strong></em><h2 id=_2>描述</h2><p>PLC_RUN显示一个位模式来指示多任务系统中哪些进程正在运行IEC61131-3 PLC任务。在_运动控制器_中运行的每个PLC任务有一个位。<h2 id=_3>值</h2><table><thead><tr><th><strong>位</strong><th><strong>描述</strong><th><strong>值</strong><tbody><tr><td>n<td>进程n上有一个PLC任务正在运行_。_<td></table><h2 id=_4>例</h2><p>IEC61131-3 PLC任务设置在进程2、3和6上运行。在命令行终端检查“PLC_RUN”的值。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=o>>>?</span><span class=vg>HEX</span><span class=p>(</span><span class=vg>PLC_RUN</span><span class=p>)</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=nl>4</span><span class=vg>c</span>
</span><span id=__span-0-3><a href=#__codelineno-0-3 id=__codelineno-0-3 name=__codelineno-0-3></a><span class=o>>></span>
</span></code></pre></div><div class="admonition note"><p><em>检查十六进制的值比十进制的值更清楚地显示位位置。$4c = 0100 1100的二进制。如果愿意，可以通过去掉HEX修饰符来以十进制形式显示该值，在这种情况下将返回值76。</em></div><nav class=md-tags><span class=md-tag>系统参数</span></nav>
