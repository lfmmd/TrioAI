</span></code></pre></div><h2 id=_3>描述</h2><p>该参数包含在令牌列表中，允许旧程序在MC4xx/MC5xx/MC6xx运动控制器中编译。它没有任何功能，但该值会存储该值的最低有效位。<p>在MC2xx和之前，VERIFY用于改变脉冲计数轴上的编码器端口，以计数正交编码器脉冲。<a href=ATYPE.html>在MC⅘/6范围内，通过改变轴类型(ATYPE)</a>来完成相同的动作。<nav class=md-tags><span class=md-tag>轴参数</span></nav>
