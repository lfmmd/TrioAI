<h1 id=move_count_inc>MOVE_COUNT_INC</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>MOVE_COUNT_INC将<a href=MOVE_COUNT.html>MOVE_COUNT</a>设置为每次加载和启动运动命令时递增或递减。当一个移动模式停止然后反转时，可以使用该设置，例如在一个机器中跟随一系列点通过XY路径。<h2 id=_3>值</h2><table><thead><tr><th><th><tbody><tr><td>0<td>MOVE_COUNT = MOVE_COUNT + 1 每个新移动<tr><td>1<td>MOVE_COUNT = MOVE_COUNT – 1 每个新移动</table><nav class=md-tags><span class=md-tag>轴参数</span></nav>
