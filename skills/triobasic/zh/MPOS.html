<h1 id=mpos>MPOS</h1><h2 id=_1>类型</h2><p><em><strong>轴参数(只读)</strong></em><h2 id=_2>描述</h2><p>该参数是由编码器或解析器测量的轴的位置。<div class="admonition note"><p><em>除非使用绝对编码器，否则MPOS在上电或软件复位时重置为0。</em></div><p>使用<a href=DEFPOS.html>命令或</a><a href=OFFPOS.html>OFFPOS</a>轴参数来移动基准位置或在<a href=REP_DIST.html>REP_DIST</a>运行时调整该值。位置以用户<a href=UNITS.html>UNITS</a>报告。<h2 id=_3>值</h2><p>以用户<a href=UNITS.html>UNITS</a>为单位的实际轴位置。<h2 id=_4>例</h2><div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=kr>WAIT</span><span class=w> </span><span class=k>UNTIL</span><span class=w> </span><span class=vg>MPOS</span><span class=w> </span><span class=o>>=</span><span class=w> </span><span class=il>1250</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=vg>SPEED</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=mf>2.5</span>
</span></code></pre></div><nav class=md-tags><span class=md-tag>轴参数</span></nav>
