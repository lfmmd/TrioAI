<h1 id=unlock>UNLOCK</h1><h2 id=_1>类型</h2><p><em><strong>系统命令(仅限命令行)</strong></em><h2 id=_2>语法</h2><p><code>UNLOCK(code)</code><h2 id=_3>描述</h2><p>使用<a href=LOCK.html>LOCK</a>命令解锁之前被锁定的_运动控制器_。<p>要解锁_运动控制器_，应使用最初用于<a href=LOCK.html>LOCK</a>它的相同安全码输入UNLOCK命令。<div class="admonition success"><p>你应该使用Motion Perfect来LOCK和UNLOCK你的控制器。</div><div class="admonition note"><p><em>如果您忘记了用于锁定运动协调器的安全码，则可能需要将其退还给您的供应商以解锁。</em></div><h2 id=_4>参数</h2><table><thead><tr><th><th><tbody><tr><td>code:<td>任意7位整数</table><h2 id=_5>查看</h2><p><a href=LOCK.html>LOCK</a><nav class=md-tags><span class=md-tag>系统命令</span></nav>
