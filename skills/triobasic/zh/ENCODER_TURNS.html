<h1 id=encoder_turns>ENCODER_TURNS</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>返回EnDat或多摩川绝对值编码器的多圈计数。<div class="admonition note"><p><em>在多摩川绝对值编码器初始化后，多圈数据不会自动应用于轴<a href=MPOS.html>MPOS</a>。应用程序程序员必须根据需要使用<a href=OFFPOS.html>OFFPOS或</a><a href=DEFPOS.html>DEFPOS</a>从BASIC中应用它。</em></div><h2 id=_3>值</h2><p>来自编码器的多圈计数。<h2 id=_4>例</h2><p>初始化一个多摩川编码器，并应用圈数到<a href=MPOS.html>MPOS</a>。编码器返回17位的位置数据和16位圈数数据。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>ATYPE</span><span class=o>=</span><span class=il>46</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=vg>OFFPOS</span><span class=o>=</span><span class=w> </span><span class=vg>ENCODER_TURNS</span><span class=o>*</span><span class=il>2</span><span class=o>^</span><span class=il>17</span>
</span><span id=__span-0-3><a href=#__codelineno-0-3 id=__codelineno-0-3 name=__codelineno-0-3></a><span class=kr>WAIT</span><span class=w> </span><span class=k>UNTIL</span><span class=w> </span><span class=vg>OFFPOS</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=il>0</span>
</span></code></pre></div><nav class=md-tags><span class=md-tag>轴参数</span></nav>
