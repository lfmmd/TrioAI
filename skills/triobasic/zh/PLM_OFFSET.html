<h1 id=plm_offset>PLM_OFFSET</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>此轴参数仅用于接口模块，且仅在(位置模式)下使用。SLMPLM该参数允许SLM/PLM电机编码器保持的一圈内的绝对位置与控制器中的零位之间的偏移。<div class="admonition note"><p><em>通常不需要设置此参数，因为它是在PLM初始化期间配置的。</em></div><h2 id=_3>值</h2><p>绝对位置与控制器零位之间的偏移量。<nav class=md-tags><span class=md-tag>轴参数</span></nav>
