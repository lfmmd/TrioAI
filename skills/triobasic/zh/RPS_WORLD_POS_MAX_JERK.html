<h1 id=world_pos_max_jerk>WORLD_POS_MAX_JERK</h1><h2 id=_1>类型</h2><p><em><strong>机器人参数</strong></em><h2 id=_2>描述</h2><p>WORLD_POS_MAX_JERK轴参数可用于在世界模式下读取和写入最大可能的线性轴<a href=JERK.html>JERK</a>。<p><a href=JERK.html>JERK</a>是加速度的导数。<a href=JERK.html>JERK</a>单位为/秒/秒/秒。<a href=JERK.html>JERK</a>应用于轴运动的方式取决于<a href=VP_MODE.html>VP_MODE</a>的值。<h2 id=_3>值</h2><p>机器人轴最大线加速度以mm/ 秒3为单位。<h2 id=_4>查看</h2><p><a href=AXIS_UNITS.html>Axis_units</a>, <a href=JERK.html>JERK</a>, <a href=VP_MODE.html>VP_MODE</a>。<nav class=md-tags><span class=md-tag>机器人参数</span></nav>
