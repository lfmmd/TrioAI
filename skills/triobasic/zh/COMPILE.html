<h1 id=_1>编译</h1><h2 id=_2>类型</h2><p><em><strong>系统命令</strong></em><h2 id=_3>描述</h2><p>强制编译当前选定的程序。程序编译由系统软件在程序<a href=RUN.html>RUN</a>之前或在另一个程序被<a href=SELECT.html>SELECT</a>时自动执行。因此，通常不需要使用此命令。<h2 id=_4>参见</h2><p><a href=SELECT.html>SELECT</a>,<a href=COMPILE_ALL.html>COMPILE_ALL</a><nav class=md-tags><span class=md-tag>系统命令</span></nav>
