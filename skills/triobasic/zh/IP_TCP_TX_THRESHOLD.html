<h1 id=ip_tcp_tx_threshold>IP_TCP_TX_THRESHOLD</h1><h2 id=_1>类型</h2><p><em><strong>系统参数(MC_CONFIG)</strong></em><h2 id=_2>描述</h2><p>IP_TCP_TX_THRESHOLD定义触发报文传输的TCP套接字传输缓冲区中的字节数。默认值为32。该值适用于所有TCP协议。<h2 id=_3>值</h2><div class="admonition note"><p><em>更改此值前请咨询Trio。</em></div><table><thead><tr><th><strong>大小</strong><th><strong>描述</strong><th><strong>值</strong><th><strong>默认</strong><tbody><tr><td>word<td>触发传输的TCP套接字传输缓冲区中的字节数。<td>1 ~ 1023<td>32</table><div class="admonition danger"><p>将此值设置远离默认值可能会使Motion Perfect连接不稳定。</div><h2 id=_4>例</h2><p>当数据量很小时，强制以太网处理器立即发送TCP数据包，以免等待超时后才发送。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>IP_TCP_TX_THRESHOLD</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=il>16</span>
</span></code></pre></div><nav class=md-tags><span class=md-tag>系统参数</span></nav>
