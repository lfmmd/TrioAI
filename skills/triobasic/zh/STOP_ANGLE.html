<h1 id=stop_angle>STOP_ANGLE</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>此参数与<a href=CORNER_MODE.html>Corner_mode</a>一起使用，它定义了将以速度合并的2轴插补移动方向的最大变化。当方向变化大于这个角度时，速度降为0。<h2 id=_3>值</h2><p>将速度降低到0的角度(以弧度为单位)。<h2 id=_4>例</h2><p>当过渡角大于25度时，将速度降至零。<a href=DECEL_ANGLE.html>DECEL_ANGLE</a>设置为25度，以便在25度以下不会降低速度。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>CORNER_MODE</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=il>2</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=vg>STOP_ANGLE</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=il>25</span><span class=w> </span><span class=o>*</span><span class=w> </span><span class=vg>PI</span><span class=w> </span><span class=o>/</span><span class=w> </span><span class=il>180</span>
</span><span id=__span-0-3><a href=#__codelineno-0-3 id=__codelineno-0-3 name=__codelineno-0-3></a><span class=vg>DECEL_ANGLE</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=vg>STOP_ANGLE</span>
</span></code></pre></div><h2 id=_5>查看</h2><p><a href=CORNER_MODE.html>CORNER_MODE</a>, <a href=DECEL_ANGLE.html>DECEL_ANGLE</a><nav class=md-tags><span class=md-tag>轴参数</span></nav>
