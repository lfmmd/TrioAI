<h1 id=endmove_buffer>ENDMOVE_BUFFER</h1><h2 id=_1>类型</h2><p><em><strong>轴参数(只读)</strong></em><h2 id=_2>描述</h2><p>这保存了缓冲的移动序列结束的绝对位置。<div class="admonition success"><p>因为它是一个绝对值，所以ENDMOVE_BUFFER可以通过<a href=OFFPOS.html>OFFPOS/</a><a href=DEFPOS.html>DEFPOS</a>进行调整。缓冲区中的单个移动是增量的，不通过<a href=OFFPOS.html>OFFPOS</a>进行调整。</div><h2 id=_3>值</h2><p>返回一个轴所有剩余移动的长度。<h2 id=_4>例</h2><p>向缓冲区添加一些移动，然后检查ENDMOVE_BUFFER的值<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=o>>></span><span class=vg>MOVE</span><span class=p>(</span><span class=il>100</span><span class=p>)</span><span class=w> </span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=o>>></span><span class=vg>MOVE</span><span class=p>(</span><span class=il>150</span><span class=p>)</span>
</span><span id=__span-0-3><a href=#__codelineno-0-3 id=__codelineno-0-3 name=__codelineno-0-3></a><span class=o>>></span><span class=vg>MOVE</span><span class=p>(</span><span class=il>25</span><span class=p>)</span>
</span><span id=__span-0-4><a href=#__codelineno-0-4 id=__codelineno-0-4 name=__codelineno-0-4></a><span class=o>>></span><span class=kr>PRINT</span><span class=w> </span><span class=vg>ENDMOVE_BUFFER</span>
</span><span id=__span-0-5><a href=#__codelineno-0-5 id=__codelineno-0-5 name=__codelineno-0-5></a><span class=nl>275</span><span class=mf>.000</span>
</span><span id=__span-0-6><a href=#__codelineno-0-6 id=__codelineno-0-6 name=__codelineno-0-6></a><span class=o>>></span>
</span></code></pre></div><nav class=md-tags><span class=md-tag>轴参数</span></nav>
