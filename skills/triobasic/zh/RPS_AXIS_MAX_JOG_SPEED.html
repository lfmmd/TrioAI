<h1 id=axis_max_jog_speed>AXIS_MAX_JOG_SPEED</h1><h2 id=_1>类型</h2><p><em><strong>机器人参数</strong></em><h2 id=_2>描述</h2><p>设置机器人轴在执行点动时可以运行的最大点动速度(用户单位每秒)。<h2 id=_3>值</h2><p>以用户为单位的<a href=AXIS_UNITS.html>axis_units</a>/秒的速度，一个轴在点动时将被限制在这个速度。<h2 id=_4>查看</h2><p><a href=RPS_AXIS_JOGSPEED.html>AXIS_JOGSPEED</a>, <a href=AXIS_UNITS.html>AXIS_UNITS</a><nav class=md-tags><span class=md-tag>机器人参数</span></nav>
