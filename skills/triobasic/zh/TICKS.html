<h1 id=ticks>TICKS</h1><h2 id=_1>类型</h2><p><em><strong>过程参数</strong></em><h2 id=_2>描述</h2><p>当前进程时钟运行的计数存储在这个参数中。进程参数是一个64位计数器，在每个伺服周期中递减。因此，它可以用来测量周期时间，添加时间延迟等。TICKS参数可以被写入和读取。<div class="admonition note"><p><em>由于TICKS是一个进程参数，每个进程都有自己的计数器。</em></div><h2 id=_3>值</h2><p>64位计数器的值<h2 id=_4>例</h2><p><a href=SERVO_PERIOD.html>SERVO_PERIOD</a>设置为1000使用TICKS 3秒延迟<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=nl>delay:</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=w> </span><span class=vg>TICKS</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=il>3000</span>
</span><span id=__span-0-3><a href=#__codelineno-0-3 id=__codelineno-0-3 name=__codelineno-0-3></a><span class=w> </span><span class=vg>OP</span><span class=p>(</span><span class=il>9</span><span class=p>,</span><span class=w> </span><span class=kr>ON</span><span class=p>)</span>
</span><span id=__span-0-4><a href=#__codelineno-0-4 id=__codelineno-0-4 name=__codelineno-0-4></a><span class=nl>test:</span>
</span><span id=__span-0-5><a href=#__codelineno-0-5 id=__codelineno-0-5 name=__codelineno-0-5></a><span class=w> </span><span class=kr>IF</span><span class=w> </span><span class=vg>TICKS</span><span class=w> </span><span class=o>&lt;=</span><span class=w> </span><span class=il>0</span><span class=w> </span><span class=kr>THEN</span><span class=w> </span><span class=vg>OP</span><span class=p>(</span><span class=il>9</span><span class=p>,</span><span class=w> </span><span class=k>OFF</span><span class=p>)</span><span class=w> </span><span class=k>ELSE</span><span class=w> </span><span class=kr>GOTO</span><span class=w> </span><span class=nl>test</span>
