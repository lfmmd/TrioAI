<h1 id=clear_params>CLEAR_PARAMS</h1><h2 id=_1>类型</h2><p><em><strong>系统命令(仅限命令行)</strong></em><h2 id=_2>描述</h2><p>将所有flash参数重置为默认值。该命令只能在命令行中使用。<div class="admonition note"><p><em>发出该命令后必须断电重启，以确保所有参数生效。</em></div><div class="admonition danger"><p>这将使IP地址重置为默认值，因此在断电重启后您可能无法连接。</div><div class="admonition success"><p>您应该使用MC_CONFIG文件来设置所有FLASH/ MC_CONFIG参数，以便将它们保存为项目的一部分。</div><nav class=md-tags><span class=md-tag>系统命令</span></nav>
