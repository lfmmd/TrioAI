<h1 id=_1>介绍</h1><p>机器人编程系统(RPS)是一种适应性强的工具和软件包，可提供对机器人系统的完整控制和管理，减少编程并优化生产率。<p>RPS是一个语言扩展块，专门用于使用基于Trio Basic的Trio控制器的机器人应用程序。<p>RPS通过减少程序中的行数来提高代码和应用程序的效率。它与标准的Trio Basic完美匹配。<p>RPS有一组运动学变换，先进的控制算法提供了在一个坐标系中编程的可能性，当机器与他的坐标系没有直接的机械连接时。一旦在控制器中设置了RPS，则选定的一组轴将被设置为机器人。<p>要激活控制器中的RPS，需要配置数据来指定机械链接的长度、操作模式和其他信息。
