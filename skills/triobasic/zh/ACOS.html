<h1 id=acos>ACOS</h1><h2 id=_1>类型</h2><p><em><strong>数学函数</strong></em><h2 id=_2>语法</h2><p><code>value = ACOS(expression)</code><h2 id=_3>描述</h2><p>ACOS函数返回一个数字的反余弦，其范围应在1到-1之间。结果以弧度表示，范围0到π。(查看 <a href=PI.html>PI</a>).<h2 id=_4>参数</h2><table><thead><tr><th><th><tbody><tr><td>值：<td>以弧度度量的角度。<tr><td>expression<td>任何有效的TrioBASIC表达式，返回值介于-1和1之间。</table><h2 id=_5>例子</h2><p>在命令行上打印-1的反余弦。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=o>>></span><span class=kr>PRINT</span><span class=w> </span><span class=vg>ACOS</span><span class=p>(</span><span class=il>-1</span><span class=p>)</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=nl>3</span><span class=mf>.1416</span>
</span><span id=__span-0-3><a href=#__codelineno-0-3 id=__codelineno-0-3 name=__codelineno-0-3></a><span class=o>>></span>
</span></code></pre></div><h2 id=_6>查看</h2><p><a href=SIN.html>SIN</a>, <a href=COS.html>COS</a>, <a href=TAN.html>TAN</a>, <a href=ASIN.html>ASIN</a>, <a href=ATAN.html>ATAN</a>, <a href=ATAN2.html>ATAN2</a><nav class=md-tags><span class=md-tag>数学函数</span></nav>
