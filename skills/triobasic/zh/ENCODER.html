<h1 id=encoder>ENCODER</h1><h2 id=_1>类型</h2><p><em><strong>轴参数(只读)</strong></em><h2 id=_2>描述</h2><p>ENCODER轴参数保存位置反馈设备的原始副本。<p><a href=MPOS.html>MPOS</a>轴测量位置从ENCODER值自动计算，允许溢出和偏移。<h2 id=_3>值</h2><table><thead><tr><th><strong>反馈装置</strong><th><strong>值</strong><tbody><tr><td>增量编码器:<td>锁存在编码器硬件寄存器中的值<tr><td>绝对编码器:<td>使用<a href=ENCODER_BITS.html>ENCODER_BITS</a>中设置的位数的位置值<tr><td>数字量轴:<td>来自驱动器的原始位置反馈</table><h2 id=_4>查看</h2><p><a href=ENCODER_BITS.html>ENCODER_BITS</a>, <a href=MPOS.html>MPOS</a><nav class=md-tags><span class=md-tag>轴参数</span></nav>
