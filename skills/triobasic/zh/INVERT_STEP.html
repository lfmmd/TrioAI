<h1 id=invert_step>INVERT_STEP</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>INVERT_STEP用于为步进脉冲输出电路开启硬件取反。这对于连接到一些步进驱动器是必要的。运动控制器步进脉冲产生的电路逻辑为：步进输出的下降沿为运动的激活沿。这适用于大多数步进驱动器。<div class="admonition note"><p><em>INVERT_STEP应该设置为WDOG=OFF。</em></div><div class="admonition danger"><p>如果设置不正确，步进电机在改变方向时可能会丢失一步位置。</div><h2 id=_3>值</h2><table><thead><tr><th><th><tbody><tr><td><a href=ON.html>ON</a><td>步进信号的上升沿为激活沿<tr><td><a href=OFF.html>OFF</a><td>步进信号的下降沿为激活沿(默认)</table><h2 id=_4>例</h2><p>设置轴2的INVERT_STEP作为启动例程的一部分。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=k>BASE</span><span class=p>(</span><span class=il>2</span><span class=p>)</span>
