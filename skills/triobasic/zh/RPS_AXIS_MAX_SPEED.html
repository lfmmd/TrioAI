<h1 id=axis_max_speed>axis_max_speed</h1><h2 id=_1>类型</h2><p><em><strong>机器人参数</strong></em><h2 id=_2>描述</h2><p>axis_max_speed轴参数可用于读取和写入最大可能的轴速度。<p>如果实际速度超过此值，则会触发错误“超过最高速度限制”。<h2 id=_3>值</h2><p>机器人轴的最大速度，单位为<a href=AXIS_UNITS.html>AXIS_UNITS</a> /秒。<h2 id=_4>查看</h2><p><a href=AXIS_UNITS.html>AXIS_UNITS</a><nav class=md-tags><span class=md-tag>机器人参数</span></nav>
