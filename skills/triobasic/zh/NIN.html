<h1 id=nin>NIN</h1><h2 id=_1>类型</h2><p><em><strong>I / O参数</strong></em><h2 id=_2>描述</h2><p>这个参数返回系统适配的输入个数。该值通常由固件设置，包括检测到的总I/O，包括模块I/O, CAN I/O，现场总线I/O和CANopen I/O。<h2 id=_3>值</h2><p>正在使用的最高输入点+ 1。<h2 id=_4>例</h2><p>控制器上除了16个内置I/O点外，还有24个外部输出点。在终端输入?NIN:<p><code>> > ?NIN</code><p><code>40.0000</code><p><code>>></code><p>请注意;在这种情况下，最后一个可寻址的输入点是IN(39)。<h2 id=_5>查看</h2><p><a href=IOSIZE.html>IOSIZE</a>, <a href=NOP.html>NOP</a><nav class=md-tags><span class=md-tag>I / O参数</span></nav>
