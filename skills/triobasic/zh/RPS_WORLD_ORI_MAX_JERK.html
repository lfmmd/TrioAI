<h1 id=world_ori_max_jerk>WORLD_ORI_MAX_JERK</h1><h2 id=_1>类型</h2><p><em><strong>机器人参数</strong></em><h2 id=_2>描述</h2><p>WORLD_ORI_MAX_JERK轴参数可用于在世界模式下读取和写入最大可能的方向轴加加速度。<p><a href=JERK.html>JERK</a>是加速度的导数。<a href=JERK.html>JERK</a>单位为/秒3。<a href=JERK.html>JERK</a>应用于轴运动的方式取决于<a href=VP_MODE.html>VP_MODE</a>的值。<h2 id=_3>值</h2><p>机器人轴的最大方向加加速度，单位为度/秒3。<h2 id=_4>查看</h2><p><a href=RPS_WORLD_ORI_MAX_SPEED.html>WORLD_ORI_MAX_SPEED</a>, <a href=RPS_WORLD_ORI_MAX_ACC.html>WORLD_ORI_MAX_ACC</a><nav class=md-tags><span class=md-tag>机器人参数</span></nav>
