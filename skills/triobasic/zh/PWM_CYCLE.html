<h1 id=pwm_cycle>PWM_CYCLE</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>语法</h2><p><code>PWM_CYCLE = value</code><h2 id=_3>描述</h2><p>定义在组合标记+空格周期内的内部时钟数(最大值65535)。<div class="admonition note"><p><em>20MHz时钟用作PWM产生的基准时钟。</em></div><h2 id=_4>参数</h2><table><thead><tr><th><th><tbody><tr><td>value<td>一个PWM脉冲的20MHz时钟脉冲数</table><h2 id=_5>例</h2><h3 id=1>例1</h3><p>如果PWM_CYCLE=1000, PWM将以20 kHz频率产生<p>如果PWM_CYCLE=200, PWM将以100 kHz频率产生(但分辨率较低)<h2 id=_6>查看</h2><p><a href=PWM_CONTROL.html>PWM_CONTROL</a>, <a href=PWM_MARK.html>PWM_MARK</a><nav class=md-tags><span class=md-tag>轴参数</span></nav>
