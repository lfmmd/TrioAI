<h1 id=fast_jog>FAST_JOG</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>该参数保存要用作快速点动输入的输入数字。如果FAST_JOG是激活的，那么点动输入将使用jog函数的轴<a href=SPEED.html>速度</a>，否则将使用<a href=JOGSPEED.html>JOGSPEED</a>。<div class="admonition note"><p><em>用于FAST _JOG的输入是低电平触发的。</em></div><h2 id=_3>值</h2><table><thead><tr><th><th><tbody><tr><td>-1<td>禁用输入为FAST_JOG(默认)<tr><td>0 - 63<td>输入用作基准输入</table><div class="admonition success"><p>任何类型的输入都可以使用，内置，Trio can I/O, CANopen或虚拟。</div><h2 id=_4>例</h2><p>配置输入12和13为点动输入<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>FWD_JOG</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=il>12</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=vg>FAST_JOG</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=il>13</span>
</span><span id=__span-0-3><a href=#__codelineno-0-3 id=__codelineno-0-3 name=__codelineno-0-3></a><span class=vg>JOGSPEED</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=il>200</span>
</span></code></pre></div><h2 id=_5>查看</h2><p><a href=FWD_JOG.html>FWD_JOG</a>, <a href=JOGSPEED.html>JOGSPEED</a>, <a href=REV_JOG.html>REV_JOG</a><nav class=md-tags><span class=md-tag>轴参数</span></nav>
