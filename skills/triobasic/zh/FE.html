<h1 id=fe>FE</h1><h2 id=_1>类型</h2><p><em><strong>轴参数(只读)</strong></em><h2 id=_2>描述</h2><p>该参数返回位置误差，等于给定位置<a href=DPOS.html>(DPOS)</a> -测量位置<a href=MPOS.html>(MPOS)</a>。<h2 id=_3>值</h2><p>跟随误差以用户UNITS返回。<h2 id=_4>例</h2><p>等待位置误差在5个伺服周期低于一个值，然后输出脉冲。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>MOVEABS</span><span class=p>(</span><span class=il>200</span><span class=p>)</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=kr>WAIT</span><span class=w> </span><span class=vg>IDLE</span>
</span><span id=__span-0-3><a href=#__codelineno-0-3 id=__codelineno-0-3 name=__codelineno-0-3></a><span class=kr>FOR</span><span class=w> </span><span class=vg>x</span><span class=o>=</span><span class=il>0</span><span class=w> </span><span class=vg>to</span><span class=w> </span><span class=il>4</span>
</span><span id=__span-0-4><a href=#__codelineno-0-4 id=__codelineno-0-4 name=__codelineno-0-4></a><span class=w>    </span><span class=kr>WAIT</span><span class=w> </span><span class=k>UNTIL</span><span class=w> </span><span class=vg>FE</span><span class=o>&lt;</span><span class=il>5</span>
</span><span id=__span-0-5><a href=#__codelineno-0-5 id=__codelineno-0-5 name=__codelineno-0-5></a><span class=kr>NEXT</span><span class=w> </span><span class=vg>x</span>
</span><span id=__span-0-6><a href=#__codelineno-0-6 id=__codelineno-0-6 name=__codelineno-0-6></a><span class=vg>OP</span><span class=p>(</span><span class=il>5</span><span class=p>,</span><span class=kr>ON</span><span class=p>)</span>
</span><span id=__span-0-7><a href=#__codelineno-0-7 id=__codelineno-0-7 name=__codelineno-0-7></a><span class=vg>WA</span><span class=p>(</span><span class=il>2</span><span class=p>)</span>
</span><span id=__span-0-8><a href=#__codelineno-0-8 id=__codelineno-0-8 name=__codelineno-0-8></a><span class=vg>OP</span><span class=p>(</span><span class=il>5</span><span class=p>,</span><span class=k>OFF</span><span class=p>)</span>
</span></code></pre></div><h2 id=_5>查看</h2><p><a href=FE_LATCH.html>FE_LATCH</a>, <a href=FE_LIMIT.html>FE_LIMIT</a>, <a href=FE_RANGE.html>FE_RANGE</a><nav class=md-tags><span class=md-tag>轴参数</span></nav>
