<h1 id=flash_status>FLASH_STATUS</h1><h2 id=_1>类型</h2><p><em><strong>系统参数</strong></em><h2 id=_2>语法</h2><p><code>value = FLASH_STATUS</code><h2 id=_3>描述</h2><p>这个只读参数返回闪存的状态。<div class="admonition note"><p><em>当程序被编辑或新程序被下载时，闪存可能处于繁忙状态。Flash重新编程是在后台进行的，大文件需要一些时间来存储。</em></div><div class="admonition note"></div><h2 id=_4>参数</h2><table><thead><tr><th><th><tbody><tr><td>位<td>描述<tr><td>0<td>1 = flash忙(如果控制器断电可能会丢失数据) <br><br>0 = flash空闲(数据保存，所以可以安全地将控制器断电)</table><h2 id=_5>例</h2><h3 id=1>例1</h3><p>PRINT FLASH_STATUS<h2 id=_6>查看</h2><p><a href=FLASHTABLE.html>FLASHTABLE</a>, <a href=FLASHVR.html>FLASHVR</a><nav class=md-tags><span class=md-tag>系统参数</span></nav>
