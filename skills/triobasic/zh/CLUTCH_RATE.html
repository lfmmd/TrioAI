<h1 id=clutch_rate>CLUTCH_RATE</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>这通过以指定的速率/秒改变连接比率来影响CONNECT的操作。<p>默认的CLUTCH_ RATE设置非常高，以确保与早期版本的兼容性。<h2 id=_3>值</h2><p>每秒连接率的变化(默认1000000)<h2 id=_4>例</h2><p>设置输入时，连接比将从0更改为6。连接轴需要2秒的加速时间，所以连接比必须以每秒3的速度变化。<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>CLUTCH_RATE</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=il>3</span>
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a><span class=vg>CONNECT</span><span class=p>(</span><span class=il>0</span><span class=p>,</span><span class=il>0</span><span class=p>)</span>
</span><span id=__span-0-3><a href=#__codelineno-0-3 id=__codelineno-0-3 name=__codelineno-0-3></a><span class=kr>WAIT</span><span class=w> </span><span class=k>UNTIL</span><span class=w> </span><span class=vg>IN</span><span class=p>(</span><span class=il>1</span><span class=p>)</span><span class=o>=</span><span class=kr>ON</span>
</span><span id=__span-0-4><a href=#__codelineno-0-4 id=__codelineno-0-4 name=__codelineno-0-4></a><span class=vg>CONNECT</span><span class=p>(</span><span class=il>6</span><span class=p>,</span><span class=il>0</span><span class=p>)</span>
</span></code></pre></div><nav class=md-tags><span class=md-tag>轴参数</span></nav>
