<h1 id=posi_seq_delay>POSI_SEQ_DELAY</h1><h2 id=_1>类型</h2><p><em><strong>轴参数</strong></em><h2 id=_2>描述</h2><p>该命令控制应用于给定位置(DPOS)的伺服周期延迟的数量。该特性通过posi_seq_mode启用。<h2 id=_3>值</h2><p>默认值为0。<h2 id=_4>查看</h2><p><a href=DPOS.html>DPOS</a>, <a href=POSI_SEQ_MODE.html>POSI_SEQ_MODE</a><nav class=md-tags><span class=md-tag>轴参数</span></nav>
