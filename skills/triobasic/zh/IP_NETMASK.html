<h1 id=ip_netmask>IP_NETMASK</h1><h2 id=_1>类型</h2><p><em><strong>系统参数(MC_CONFIG / FLASH)</strong></em><h2 id=_2>描述</h2><p>IP_NETMASK用于设置_运动控制器_主以太网端口的以太网IPv4子网掩码。该参数使用标准的点(.)表示法来定义IP子网掩码的4个独立的八位字节。<p>该值保存在flash EPROM中，可以在MC_CONFIG脚本中设置。<h2 id=_3>值</h2><p>点(.)格式的网络子网掩码。<h2 id=_4>例</h2><h3 id=1>例1</h3><div class="language-BASIC highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a><span class=vg>IP_NETMASK</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=mf>255.255.255.0</span>
</span></code></pre></div><h3 id=2>例2</h3><p>在MC_CONFIG文件中设置IP子网掩码:<div class="language-BASIC highlight"><pre><span></span><code><span id=__span-1-1><a href=#__codelineno-1-1 id=__codelineno-1-1 name=__codelineno-1-1></a><span class=c1>'MC_CONFIG脚本文件</span>
</span><span id=__span-1-2><a href=#__codelineno-1-2 id=__codelineno-1-2 name=__codelineno-1-2></a><span class=vg>IP_NETMASK</span><span class=w> </span><span class=o>=</span><span class=w> </span><span class=mf>255.255.255.0</span>
</span></code></pre></div><nav class=md-tags><span class=md-tag>系统参数</span></nav>
