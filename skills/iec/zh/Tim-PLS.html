</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a>Q := MyPLS.Q;
</span></code></pre></div><h2 id=fbd>FBD 语言</h2><p><h2 id=ld>LD 语言</h2><p><h2 id=_5>查看</h2><p><a href=Tim-TON.html>TON</a><p><a href=Tim-TOF.html>TOF</a><p><a href=Tim-TP.html>TP</a><nav class=md-tags><span class=md-tag>Function Block</span></nav>
