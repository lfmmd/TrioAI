<h1 id=move>:= MOVE</h1><p><em><strong>Operator (操作)</strong></em><p>将一个常量或变量的值移动至另一个变量。<h2 id=_1>输入</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>IN<td>ANY<td>一个常量或变量的值。</table><h2 id=_2>输出</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>Q<td>ANY<td>将被 ‘IN’分配的变量。</table><h2 id=_3>备注</h2><p>‘IN’ 和 ‘Q’ 的数据类型必须相同<h2 id=st>ST 语言</h2><div class="language-text highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a>Q := -IN;
</span><span id=__span-0-2><a href=#__codelineno-0-2 id=__codelineno-0-2 name=__codelineno-0-2></a>Q := - (IN1 + IN2);
</span></code></pre></div><h2 id=fbd>FBD 语言</h2><p><nav class=md-tags><span class=md-tag>Operator</span></nav>
