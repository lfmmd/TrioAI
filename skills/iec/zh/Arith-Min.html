<h1 id=min>MIN</h1><p><em><strong>Function (函数)</strong></em><p>获取两个值的最小值。<h2 id=_1>输入</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>IN1<td>ANY<td>第一个输入<tr><td>IN2<td>ANY<td>第二个输入</table><h2 id=_2>输出</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>Q<td>ANY<td>如果 IN1 &lt; IN，IN1 ; 其他情况为IN2.</table><h2 id=_3>备注</h2><p>在LD语言中，输入横档（EN）启用操作，输出横档保持输入横档的状态。在IL语言中，第一个输入必须在函数调用之前加载。第二个输入是函数的操作数。<h2 id=st>ST 语言</h2><div class="language-text highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a>Q := MIN (IN1, IN2);
</span></code></pre></div><h2 id=fbd>FBD 语言</h2><p><h2 id=ld>LD 语言</h2><p>只有EN为真时才执行比较。<p>ENO与EN具有相同的值。<br> <h2 id=_4>查看</h2><p><a href=Arith-Max.html>MAX</a><p><a href=Arith-Limit.html>LIMIT</a><p><a href=Arith-Mod.html>MOD</a><p><a href=Arith-Odd.html>ODD</a><nav class=md-tags><span class=md-tag>Function</span></nav>
