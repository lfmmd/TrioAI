<h1 id=sfc>SFC程序层次结构</h1><p>每个SFC程序可以有一个或多个“子程序”。子程序在SFC中编写，并在父程序的操作中启动（启动）或停止（终止）。子程序也可能有子程序。层次结构级别的数目不应超过19。<p>程序被停止时，它的子程序也被隐式地停止。<p>当子程序启动时，它必须在其操作中合理地启动其子程序。<p>子程序由其父程序的操作块<a href=SFC-ControllingAChildProgram.html>控制</a>（启动或停止）。设计子程序是用SFC语言编写动作块的一种简单方法。<p>使用子程序对于设计复杂的过程和由于过程的不同方面而进行的单独操作非常有用。例如，在父程序中管理执行模式和在子程序中处理过程操作的详细信息是常见的。
