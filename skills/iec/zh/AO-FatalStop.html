<h1 id=fatalstop>FatalStop</h1><p><em><strong>Function (函数)</strong></em><p>在致命错误中中断应用程序。<h2 id=_1>输入</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>IN<td>BOOL<td>条件</table><h2 id=_2>输出</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>Q<td>BOOL<td>如果执行则为TRUE</table><h2 id=_3>备注</h2><p>此函数用于中断当前周期并将虚拟机设置为错误模式。将使用调试器重新启动正常执行。<p>仅当IN参数为TRUE时，才会停止VM。则不执行当前循环的结束。<nav class=md-tags><span class=md-tag>Function</span></nav>
