<h1 id=expexpl>EXP/EXPL</h1><p><em><strong>Function (函数)</strong></em><p>计算输入的自然指数。<h2 id=_1>输入</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>IN<td>REAL/LREAL<td>浮点数值</table><h2 id=_2>输出</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>Q<td>REAL/LREAL<td>结果：输入的自然指数</table><h2 id=_3>备注</h2><p>在LD语言中，仅当输入梯级（EN）为TRUE时才执行该操作。输出梯级（ENO）保持与输入梯级相同的值。在IL中，在调用函数之前，必须在当前结果中加载输入。<h2 id=st>ST 语言</h2><div class="language-text highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a>Q := EXP (IN);
</span></code></pre></div><h2 id=fbd>FBD 语言</h2><p><h2 id=ld>LD 语言</h2><p>仅当EN为TRUE时才执行该函数。<p>ENO保持与EN相同的值。<br> <h2 id=_4>查看</h2><p><a href=Math-ABS.html>ABS</a><p><a href=Math-TRUNC.html>TRUNC</a><p><a href=Math-POW.html>POW</a><p><a href=Math-SQRT.html>SQRT</a><nav class=md-tags><span class=md-tag>Function</span></nav>
