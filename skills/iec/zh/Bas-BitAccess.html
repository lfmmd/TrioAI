<h1 id=_1>整数的位访问</h1><p>可以在表达式和图表中直接指定n个整型变量内的位，方法如下：<p><code>Variable.BitNo</code><p>其中:<table><thead><tr><th><th><tbody><tr><td>Variable<td>是整数变量的名称。<tr><td>BitNo<td>是整数中的位数。</table><p>变量可以具有以下数据类型之一：<p>SINT, USINT, BYTE (8 bits from .0 to .7)<br> INT, UINT, WORD (16 bits from .0 to .15)<br> DINT, UDINT, DWORD (32 bits from .0 to 31)<br> LINT (from 0 to 63)<div class="admonition note"><p><em>BitNo=0总是表示低有效位。</em></div>
