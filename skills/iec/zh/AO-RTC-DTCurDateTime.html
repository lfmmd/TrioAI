<h1 id=dtcurdatetime>DTCURDATETIME</h1><p><em><strong>Function Block (功能块)</strong></em><p>获取当前时间戳。<h2 id=_1>句法</h2><p><code>Inst_DTCurDateTime (bLocal);</code><h2 id=_2>输出</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>bLocal<td>BOOL<td>如果请求本地时间，则为TRUE（如果为FALSE，则为GMT）。<tr><td>.Year<td>DINT<td>输出：当前年<tr><td>.Month<td>DINT<td>输出：当前月<tr><td>.Day<td>DINT<td>输出：当前日<tr><td>.Hour<td>DINT<td>输出：当前时间：时<tr><td>.Min<td>DINT<td>输出：当前时间：分<tr><td>.Sec<td>DINT<td>输出：当前时间：秒<tr><td>.MSec<td>DINT<td>输出：当前时间：毫秒<tr><td>.TmOfDay<td>TIME<td>输出：当前日的时间（从午夜）</table><nav class=md-tags><span class=md-tag>Function Block</span></nav>
