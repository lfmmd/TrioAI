<h1 id=dtsec>DTSEC</h1><p><em><strong>Function (函数)</strong></em><p>从时间戳中提取秒。<h2 id=_1>句法</h2><p><code>Q := DTSec (iTime);</code><h2 id=_2>输入</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>ITIME<td>DINT<td>表示时间的数字戳。</table><h2 id=_3>输出</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>Q<td>DINT<td>时间的秒数（0..59）。</table><nav class=md-tags><span class=md-tag>Function</span></nav>
