<h1 id=_1>字符串表资源</h1><h2 id=_2>不可打印字符</h2><p>根据IEC标准，可以在字符串中使用特殊的“$”序列来指定不可打印字符：<table><thead><tr><th><strong>代码</strong><th><strong>含义</strong><tbody><tr><td>$$<td>一个“$”字符。<tr><td>$'<td>单引号。<tr><td>$T<td>制表位（ASCII码9）。<tr><td>$R<td>回车符（ASCII码13）。<tr><td>$L<td>换行符（ASCII码10）。<tr><td>$N<td>回车加换行字符（ASCII码13和10）。<tr><td>$P<td>分页符（ASCII码12）。<tr><td>$xx<td>任何字符（xx是用两个十六进制数字表示的ASCII码。</table>
