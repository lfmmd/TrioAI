<h1 id=dtday>DTDAY</h1><p><em><strong>Function (函数)</strong></em><p>从日期戳中提取月中的日。<h2 id=_1>句法</h2><p><code>Q := DTDay (iDate);</code><h2 id=_2>输入</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>IDATE<td>DINT<td>代表日期的数字戳。</table><h2 id=_3>输出</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>Q<td>DINT<td>日期（1..31）所在月份的第几天。</table><nav class=md-tags><span class=md-tag>Function</span></nav>
