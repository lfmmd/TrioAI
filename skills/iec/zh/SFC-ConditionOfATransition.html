<h1 id=sfc>SFC转变条件</h1><p>每个SFC转换都必须有一个布尔条件，指示是否可以跨越转换。条件是一个布尔表达式，可以用ST或LD语言编程。<p>在ST语言中，输入布尔表达式。In可以是包含函数调用和括号的复杂表达式。<h2 id=_1>例</h2><div class="language-text highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a>bForce AND (bAlarm OR min (iLevel, 1) &lt;> 1)
</span></code></pre></div><p>在LD语言中，条件由单个梯级表示。梯级末端的线圈表示过渡，不应附加任何符号。<h2 id=_2>例</h2><p>
