<h1 id=not_mask>NOT_MASK</h1><p><em><strong>Function (函数)</strong></em><p>对整数值执行按位求反。<h2 id=_1>输入</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>IN<td>ANY<td>整数输入</table><h2 id=_2>输出</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>Q<td>ANY<td>输入的按位求反</table><h2 id=_3>备注</h2><p>参数能位8到32位有符号或无符号整数。<p>在LD语言中，仅当输入梯级（EN）为真时才执行该操作输出梯级（ENO）保持与输入梯级相同的值。在IL中，在调用函数之前，必须在当前结果中加载输入。<h2 id=st>ST 语言</h2><div class="language-text highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a>Q := NOT_MASK (IN);
</span></code></pre></div><h2 id=fbd>FBD 语言</h2><p><h2 id=ld>LD 语言</h2><p>仅当EN为TRUE时才执行该函数。<p>ENO等于EN。<br> <h2 id=_4>查看</h2><p>AND_MASK<p><a href=Reg-OR_MASK.html>OR_MASK</a><p><a href=Reg-XOR_MASK.html>XOR_MASK</a><nav class=md-tags><span class=md-tag>Function</span></nav>
