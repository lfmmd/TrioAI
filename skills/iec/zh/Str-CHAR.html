<h1 id=char>CHAR</h1><p><em><strong>Function (函数)</strong></em><p>生成单个字符的字符串。<h2 id=_1>输入</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>CODE<td>DINT<td>所需字符的ASCII码。</table><h2 id=_2>输出</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>Q<td>STRING<td>只包含指定字符的字符串。</table><h2 id=_3>备注</h2><p>在LD语言中，输入梯级（EN）启用操作，输出梯级保持与输入梯级相同的值。在IL语言中，在调用函数之前，必须在当前结果中加载输入参数（代码）。<h2 id=st>ST 语言</h2><div class="language-text highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a>Q := CHAR (CODE);
</span></code></pre></div><h2 id=fbd>FBD 语言</h2><p><h2 id=ld>LD 语言</h2><p>仅当EN为TRUE时才执行该函数。<p>ENO等于EN。<br> <h2 id=_4>查看</h2><p><a href=Str-ASCII.html>ASCII</a><nav class=md-tags><span class=md-tag>Function</span></nav>
