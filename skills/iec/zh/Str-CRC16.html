<h1 id=crc16>CRC16</h1><p><em><strong>Function (函数)</strong></em><p>根据字符串的字符计算CRC16。<h2 id=_1>输入</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>IN<td>STRING<td>字符串</table><h2 id=_2>输出</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>Q<td>INT<td>根据字符串的所有字符计算的CRC16。</table><h2 id=_3>备注</h2><p>在LD语言中，输入梯级（EN）启用操作，输出梯级保持与输入梯级相同的值。在IL语言中，在调用函数之前，必须在当前结果中加载输入参数（IN）。<p>该函数计算一个MODBUS CRC16，初始值为16#FFFF。<h2 id=st>ST 语言</h2><div class="language-text highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a>Q := CRC16 (IN);
</span></code></pre></div><h2 id=fbd>FBD 语言</h2><p><h2 id=ld>LD 语言</h2><p>仅当EN为TRUE时才执行该函数。<p>ENO保持与EN相同的值。<br> <nav class=md-tags><span class=md-tag>Function</span></nav>
