<h1 id=xch>XCH</h1><p><em><strong>Function (函数)</strong></em><p>交换两个输入变量的值。<h2 id=_1>输入</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>fDataSrc1<td>ANY (*)<td>用于交换的第一个输入变量。<tr><td>fDataSrc2<td>ANY (*)<td>用于交换的第二个输入变量。</table><p>(*) SRC/DST不可为字符串。<h2 id=_2>输出</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>OK<td>BOOL<td>如果成功，则为TRUE。</table><h2 id=_3>备注</h2><p>两个输入变量必须有相同的数据类型。<h2 id=st>ST 语言</h2><p>fData1 := 1234;<p>fData2 := 5678;<div class="language-text highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a>OK := XCH (fData1, fData2); // fData1 = 5678, fData2=5678
</span></code></pre></div><nav class=md-tags><span class=md-tag>Function</span></nav>
