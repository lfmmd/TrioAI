<h1 id=cyclestop>CycleStop</h1><p><em><strong>Function (函数)</strong></em><p>将应用程序设置为循环步进模式。<h2 id=_1>输入</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>IN<td>BOOL<td>条件</table><h2 id=_2>输出</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>Q<td>BOOL<td>如果执行，则为TRUE。</table><h2 id=_3>备注</h2><p>此功能使虚拟机处于循环步进模式。将使用调试器重新启动正常执行。<p>仅当输入参数为TRUE时，才会在循环步进模式下设置VM。<p>当前的主程序和所有可能被称为子程序或UDFB的程序通常在最后执行。循环中的其他程序不执行。<nav class=md-tags><span class=md-tag>Function</span></nav>
