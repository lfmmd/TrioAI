<h1 id=concat>CONCAT</h1><p><em><strong>Function (函数)</strong></em><p>连接字符串。<h2 id=_1>输入</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>IN_1<td>STRING<td>任何字符串变量或常量表达式。<tr><td>...<td><td><tr><td>IN_N<td>STRING<td>任何字符串变量或常量表达式。</table><h2 id=_2>输出</h2><table><thead><tr><th><strong>名称</strong><th><strong>类型</strong><th><strong>描述</strong><tbody><tr><td>Q<td>STRING<td>所有输入的串联</table><h2 id=_3>备注</h2><p>在FBD或LD语言中，块可以有多达16个输入。在IL或ST中，函数接受可变数量的输入（至少2个）。<p>注意，还可以使用“+”运算符连接字符串。<h2 id=st>ST 语言</h2><div class="language-text highlight"><pre><span></span><code><span id=__span-0-1><a href=#__codelineno-0-1 id=__codelineno-0-1 name=__codelineno-0-1></a>Q := CONCAT ('AB', 'CD', 'E');
